name: Data Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Run data pipeline
        run: python data-pipeline/run_all.py --config data-pipeline/config.yaml

      - name: Commit updates
        run: |
          if [ -n "$(git status --porcelain static/data)" ]; then
            git add static/data
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "Update data pipeline outputs"
            git pull --rebase origin main
            git push
          else
            echo "No data changes to commit."
          fi
